# Stage 1 — Schema-Change Impact Analysis
# Triggered on every PR that touches a schema file or TMDL definition.
# Posts blast radius impact report as PR comment and blocks merge on critical risk.
#
# Required secrets: FABRIC_TENANT_ID, FABRIC_CLIENT_ID, FABRIC_CLIENT_SECRET

name: Fabric Impact Analysis

on:
  pull_request:
    paths:
      - "schemas/*.json"
      - "tmdl/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  blast-radius:
    name: Compute Blast Radius
    runs-on: ubuntu-latest

    env:
      FABRIC_TENANT_ID:     ${{ secrets.FABRIC_TENANT_ID }}
      FABRIC_CLIENT_ID:     ${{ secrets.FABRIC_CLIENT_ID }}
      FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fabric-agent
        run: pip install fabric-agent

      - name: Detect changed schemas
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'schemas/*.json' | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed schema files: $CHANGED"

      - name: Run blast-radius
        id: blast
        run: |
          set -e
          OVERALL_RISK=0

          for schema_file in ${{ steps.changed.outputs.files }}; do
            TABLE=$(python -c "import json; d=json.load(open('$schema_file')); print(d['table'])")
            SRC_WS=$(python -c "import json; d=json.load(open('$schema_file')); print(d['source_workspace_id'])")
            CONSUMER_WS=$(python -c "
          import json
          d = json.load(open('$schema_file'))
          for ws in d.get('consumer_workspace_ids', []):
              print(ws)
          ")
            WS_FLAGS="--workspace-id $SRC_WS"
            for ws in $CONSUMER_WS; do
              WS_FLAGS="$WS_FLAGS --workspace-id $ws"
            done
            OUTFILE="blast_radius_${TABLE}.json"
            set +e
            fabric-agent blast-radius \
              --source-table "$TABLE" \
              $WS_FLAGS \
              --change "Schema file updated in PR #${{ github.event.pull_request.number }}" \
              --json-out "$OUTFILE" \
              --fail-on-risk critical
            RISK_EXIT=$?
            set -e
            if [ $RISK_EXIT -ne 0 ]; then
              OVERALL_RISK=1
            fi
          done
          echo "overall_risk=$OVERALL_RISK" >> "$GITHUB_OUTPUT"

      - name: Upload blast-radius artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blast-radius-${{ github.event.pull_request.number }}
          path: blast_radius_*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const blastFiles = fs.readdirSync('.').filter(f => f.startsWith('blast_radius_') && f.endsWith('.json'));
            let body = '## Fabric Impact Analysis\n\n';
            body += `> PR #${{ github.event.pull_request.number }} — schema change detected\n\n`;
            for (const file of blastFiles) {
              const plan = JSON.parse(fs.readFileSync(file, 'utf8'));
              const riskEmoji = plan.risk_level === 'critical' ? '🔴' : plan.risk_level === 'high' ? '🟠' : plan.risk_level === 'medium' ? '🟡' : '🟢';
              body += `### ${riskEmoji} \`${plan.source_asset_name}\` — **${plan.risk_level.toUpperCase()}**\n`;
              body += `- Workspaces impacted: **${plan.total_workspaces_impacted}**\n`;
              body += `- Assets impacted: **${plan.total_assets_impacted}**\n\n`;
            }
            body += '---\n';
            if (${{ steps.blast.outputs.overall_risk }} === 1) {
              body += '⛔ **Blocked** — Go to Actions → Fabric Auto-Heal → Run workflow → enter PR number → Approve\n';
            } else {
              body += '✅ Risk acceptable — PR can be merged.\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on critical risk
        if: steps.blast.outputs.overall_risk == '1'
        run: |
          echo "::error::Critical risk detected — approve via fabric-production environment in Fabric Auto-Heal workflow."
          exit 1
