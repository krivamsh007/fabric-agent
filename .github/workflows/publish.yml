# ==============================================================================
# Publish to PyPI on every GitHub Release
# ==============================================================================
# Uses PYPI_API_TOKEN secret stored in GitHub repository secrets.
#
# How to release a new version:
#   1. Bump version in pyproject.toml  (e.g. 1.0.1 → 1.0.2)
#   2. git add pyproject.toml
#   3. git commit -m "chore: bump version to 1.0.2"
#   4. git push
#   5. GitHub → Releases → Draft a new release → tag v1.0.2 → Publish release
#   6. This workflow runs automatically → uploads to PyPI
# ==============================================================================

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
